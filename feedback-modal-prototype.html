<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Feedback Modal Prototype</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',-apple-system,sans-serif;background:#f0efeb;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:1.5rem}

.modal{background:white;border-radius:16px;box-shadow:0 20px 60px rgba(0,0,0,.12),0 0 0 1px rgba(0,0,0,.03);max-width:440px;width:100%;overflow:hidden;animation:up .4s cubic-bezier(.16,1,.3,1)}
@keyframes up{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}

.hdr{padding:1.75rem 2rem .5rem;text-align:center}
.ico{width:46px;height:46px;background:linear-gradient(135deg,#eff6ff,#dbeafe);border-radius:12px;display:flex;align-items:center;justify-content:center;margin:0 auto .7rem}
.ico svg{width:22px;height:22px;color:#2563eb}
.hdr h2{font-size:1.12rem;font-weight:700;letter-spacing:-.02em}
.hdr p{font-size:.82rem;color:#777;margin-top:.3rem}

.body{padding:1rem 2rem 0}

.opts{display:flex;flex-direction:column;gap:.4rem}
.opt{display:flex;align-items:center;gap:.6rem;padding:.6rem .8rem;border:1.5px solid #e8e6e1;border-radius:10px;cursor:pointer;transition:all .18s}
.opt:hover{border-color:#c4c1ba;background:#fafaf8}
.opt.sel{border-color:#2563eb;background:#eff6ff}
.opt.sel .rd{border-color:#2563eb;background:#2563eb}
.opt.sel .rd::after{transform:scale(1)}
.rd{width:17px;height:17px;border-radius:50%;border:2px solid #ccc;flex-shrink:0;position:relative;transition:all .18s}
.rd::after{content:'';position:absolute;inset:3px;border-radius:50%;background:white;transform:scale(0);transition:transform .12s}
.opt span:last-child{font-size:.82rem;font-weight:500;color:#333;line-height:1.35}

/* Free text */
.ft-wrap{max-height:0;opacity:0;overflow:hidden;transition:max-height .3s ease,opacity .3s ease}
.ft-wrap.show{max-height:180px;opacity:1;margin-top:.5rem}
textarea{width:100%;border:1.5px solid #e8e6e1;border-radius:10px;padding:.55rem .8rem;font-family:inherit;font-size:.78rem;resize:none;height:60px;outline:none;transition:border-color .2s;color:#333}
textarea:focus{border-color:#2563eb}
textarea::placeholder{color:#c4c1ba}

.extra{margin-top:.7rem}
.extra label{font-size:.68rem;font-weight:600;color:#aaa;display:block;margin-bottom:.2rem}
.extra textarea{height:46px}

.ftr{padding:.85rem 2rem 1.6rem;display:flex;flex-direction:column;gap:.35rem;align-items:center}
.btn{width:100%;padding:.62rem;border:none;border-radius:10px;background:#2563eb;color:white;font-family:inherit;font-size:.84rem;font-weight:600;cursor:pointer;transition:all .2s;letter-spacing:-.01em}
.btn:hover:not(:disabled){background:#1d4ed8;transform:translateY(-1px);box-shadow:0 4px 12px rgba(37,99,235,.2)}
.btn:disabled{background:#d4d2cc;cursor:default}
.skip{background:none;border:none;font-family:inherit;font-size:.72rem;color:#aaa;cursor:pointer;padding:.15rem}
.skip:hover{color:#666}

.ty{text-align:center;padding:2.8rem 2rem;display:none}
.ty.show{display:block}
.ty-ico{width:52px;height:52px;background:linear-gradient(135deg,#ecfdf5,#d1fae5);border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto .65rem}
.ty-ico svg{width:26px;height:26px;color:#059669}
.ty h3{font-size:1.05rem;font-weight:700;margin-bottom:.25rem}
.ty p{font-size:.8rem;color:#777;line-height:1.5}

.form{transition:opacity .3s}
.form.hide{opacity:0;pointer-events:none;position:absolute}

@media(max-width:480px){
  .modal{max-width:100%}
  .hdr,.body{padding-left:1.4rem;padding-right:1.4rem}
  .ftr{padding-left:1.4rem;padding-right:1.4rem}
}
</style>
</head>
<body>

<div class="modal">
  <div class="form" id="form">
    <div class="hdr">
      <div class="ico">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      </div>
      <h2>Quick question before you go</h2>
      <p>What's the main reason you're not switching right now?</p>
    </div>

    <div class="body">
      <div class="opts" id="opts">
        <label class="opt" data-v="bank_account">
          <span class="rd"></span>
          <span>I don't want to open a bank account</span>
        </label>
        <label class="opt" data-v="money_control">
          <span class="rd"></span>
          <span>I'm not sure where my money would go</span>
        </label>
        <label class="opt" data-v="debit_card">
          <span class="rd"></span>
          <span>I don't need a debit card</span>
        </label>
        <label class="opt" data-v="dont_understand">
          <span class="rd"></span>
          <span>I don't understand what this changes for me</span>
        </label>
        <label class="opt" data-v="happy_current">
          <span class="rd"></span>
          <span>I'm happy with my current payouts</span>
        </label>
        <label class="opt" data-v="later">
          <span class="rd"></span>
          <span>I'll think about it later</span>
        </label>
        <label class="opt" data-v="other">
          <span class="rd"></span>
          <span>Something else</span>
        </label>
      </div>

      <div class="ft-wrap" id="ft-wrap">
        <textarea placeholder="Tell us what's on your mind..." id="ft"></textarea>
      </div>

      <div class="extra">
        <label>Anything else you'd like to share? (optional)</label>
        <textarea placeholder="e.g. 'I'd switch if...'" id="extra"></textarea>
      </div>
    </div>

    <div class="ftr">
      <button class="btn" id="btn" disabled>Submit feedback</button>
      <button class="skip" id="skip">No thanks</button>
    </div>
  </div>

  <div class="ty" id="ty">
    <div class="ty-ico">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
    </div>
    <h3>Thanks for sharing</h3>
    <p>Your feedback helps us build better tools for your business.</p>
  </div>
</div>

<script>
const opts = document.querySelectorAll('.opt');
const ftWrap = document.getElementById('ft-wrap');
const btn = document.getElementById('btn');
const form = document.getElementById('form');
const ty = document.getElementById('ty');
let picked = null;

opts.forEach(o => {
  o.addEventListener('click', () => {
    opts.forEach(x => x.classList.remove('sel'));
    o.classList.add('sel');
    picked = o.dataset.v;
    btn.disabled = false;
    ftWrap.classList.toggle('show', picked === 'other');
  });
});

function done() {
  form.classList.add('hide');
  setTimeout(() => { form.style.display = 'none'; ty.classList.add('show'); }, 280);
}

btn.addEventListener('click', () => {
  console.log('feedback_submitted', {
    reason: picked,
    freetext: document.getElementById('ft').value,
    extra: document.getElementById('extra').value
  });
  done();
});

document.getElementById('skip').addEventListener('click', () => {
  console.log('feedback_skipped');
  done();
});
</script>
</body>
</html>
